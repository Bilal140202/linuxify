name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same PR/branch when new commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Fast feedback: lint + typecheck + unit tests on every PR.
  # Target: ≤5 min total.
  # ─────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - name: Upload coverage
        if: matrix.node-version == '22'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Verify CLI runs
        run: node dist/cli/index.js --version
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Post-merge: e2e + integration tests on main.
  # Target: ≤30 min.
  # ─────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm run test:e2e
        continue-on-error: true # E2E needs real Termux; mark as non-blocking for now
        env:
          LINUXIFY_TEST_MODE: '1'
          LINUXIFY_TELEMETRY: '0'

  # ─────────────────────────────────────────────────────────────────────
  # Nightly: full compat matrix + performance benchmarks.
  # Target: ≤4 hours, sharded.
  # ─────────────────────────────────────────────────────────────────────
  nightly:
    name: Nightly Compat Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 240
    if: github.event_name == 'schedule'
    schedule:
      - cron: '0 4 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm run test:compat
        continue-on-error: true
      - run: npm run test:perf
        continue-on-error: true
      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: tests/perf/results/
          retention-days: 30
